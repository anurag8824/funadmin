server {
    listen 80;
    server_name _;

    client_max_body_size 512m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HLS manifests: short cache for quick update visibility after processing.
    location ~* \.m3u8$ {
        root /var/www/funtapp/backend;
        add_header Content-Type application/vnd.apple.mpegurl always;
        add_header Cache-Control "public, max-age=30, s-maxage=30" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # HLS segments: long immutable cache.
    location ~* \.ts$ {
        root /var/www/funtapp/backend;
        add_header Content-Type video/mp2t always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # MP4 fallback with byte-range support.
    location ~* \.mp4$ {
        root /var/www/funtapp/backend;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Accept-Ranges bytes always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # API payload compression only (do not gzip video segments).
    gzip on;
    gzip_types application/json text/plain text/css application/javascript application/xml;
    gzip_min_length 1024;
}

